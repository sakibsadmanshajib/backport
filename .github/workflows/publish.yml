name: Publish
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: yarn
          node-version: 24
      - run: yarn install --frozen-lockfile
      - run: yarn test
      - run: yarn run build
      - run: test -f dist/index.js
      - name: Scan build artifact for leaked credentials
        run: |
          set -euo pipefail
          if grep -nE '(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|sk-[A-Za-z0-9]{20,}|-----BEGIN[A-Z ]*PRIVATE KEY-----|xox[baprs]-[A-Za-z0-9-]+)' dist/index.js; then
            echo "Potential leaked credential found in dist/index.js"; exit 1
          fi
          echo "No credential value patterns found in dist/index.js"
      - name: Publish release tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="v$(node -p "require('./package.json').version")"
          major="${version%%.*}"
          if git rev-parse -q --verify "refs/tags/${version}" >/dev/null; then
            echo "Tag ${version} already exists. Nothing to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # dist/ is gitignored on main; force it into the release commit so the
          # action is usable directly by tag without tracking build output.
          git add -f dist
          git commit -m "Build ${version}"
          git tag -a "${version}" -m "${version}"
          git tag -f "${major}"
          git push origin "refs/tags/${version}"
          git push -f origin "refs/tags/${major}"
