name: Backporting
author: Thibault Derousseaux <tibdex@gmail.com>
description: >
  Automatically backport PRs to other branches by simply labeling them.
inputs:
  ai_api_key:
    description: >
      API key for the selected AI provider. Required when ai_enabled is true.
  ai_base_url:
    description: >
      Base URL for an OpenAI-compatible or Anthropic-compatible endpoint. Required when ai_provider is openai-compatible or anthropic-compatible.
  ai_aws_access_key_id:
    description: >
      Explicit AWS access key id for anthropic-bedrock. Optional; falls back to the AWS credential chain.
  ai_aws_region:
    description: >
      AWS region for anthropic-bedrock. Required when ai_provider is anthropic-bedrock.
  ai_aws_secret_access_key:
    description: >
      Explicit AWS secret access key for anthropic-bedrock. Optional; falls back to the AWS credential chain.
  ai_aws_session_token:
    description: >
      Explicit AWS session token for anthropic-bedrock. Optional.
  ai_enabled:
    description: >
      Whether to attempt a constrained AI conflict resolution after a normal backport fails.
    default: "false"
  ai_forbidden_patterns:
    description: >
      JSON array of additional repository-specific glob patterns that AI must never modify.
    default: "[]"
  ai_gcp_project:
    description: >
      GCP project id for anthropic-vertex. Required when ai_provider is anthropic-vertex.
  ai_gcp_region:
    description: >
      GCP region for anthropic-vertex. Required when ai_provider is anthropic-vertex.
  ai_gcp_service_account_json:
    description: >
      Explicit GCP service-account JSON for anthropic-vertex. Optional; falls back to Application Default Credentials.
  ai_immutable_patterns:
    description: >
      JSON array of additional glob patterns for files that AI must never modify.
    default: '["**/migrations/**","**/migration/**"]'
  ai_label:
    description: Label added to draft pull requests created after AI conflict resolution.
    default: AI backport
  ai_max_conflicted_files:
    description: Maximum number of conflicted files eligible for AI resolution.
    default: "3"
  ai_max_resolution_lines:
    description: Maximum number of adapted lines eligible for AI resolution.
    default: "60"
  ai_model:
    description: >
      Model identifier for the selected provider. Required when ai_enabled is true.
  ai_provider:
    description: >
      AI provider. Supported values are anthropic, anthropic-bedrock, anthropic-vertex, anthropic-compatible, openai, and openai-compatible.
    default: anthropic
  ai_timeout_seconds:
    description: Timeout in seconds for each model request.
    default: "120"
  ai_validation_commands:
    description: >
      Non-empty JSON array of repository validation commands. Required when ai_enabled is true.
    default: "[]"
  body_template:
    description: >
      Lodash template for the backport PR's body.

      The data properties are:
        - base: backport PR's base branch
        - body: original PR's body
        - mergeCommitSha: SHA of the original PR's merge commit
        - number: original PR's number
    default: "Backport <%= mergeCommitSha %> from #<%= number %>."
  github_token:
    description: Token for the GitHub API.
    required: true
  head_template:
    description: >
      Lodash template for the backport PR's head branch.

      The data properties are:
        - base: backport PR's base branch
        - number: original PR's number
    default: "backport-<%= number %>-to-<%= base %>"
  label_pattern:
    description: >
      The regular expression pattern that PR labels will be tested on to decide whether the PR should be backported and where.
      The backport PR's base branch will be extracted from the pattern's required `base` named capturing group.
    default: "^backport (?<base>([^ ]+))$"
  labels_template:
    description: >
      Lodash template compiling to a JSON array of labels to add to the backport PR.

      The data properties are:
        - base: backport PR's base branch
        - labels: array containing the original PR's labels, excluding those matching `label_pattern`.
    default: "[]"
  title_template:
    description: >
      Lodash template for the backport PR's title.

      The data properties are:
        - base: backport PR's base branch
        - number: original PR's number
        - title: original PR's title
    default: "[Backport <%= base %>] <%= title %>"
outputs:
  created_pull_requests:
    description: A JSON stringified object mapping the base branch of the created pull requests to their number.
runs:
  using: node24
  main: dist/index.js
branding:
  icon: arrow-left-circle
  color: purple
